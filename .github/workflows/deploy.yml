name: AWS Infrastructure Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (plan, apply, destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC authentication to request JWT token from GitHub
permissions:
  id-token: write
  contents: read

env:
  # Replace this with your active ngrok/localtunnel forwarding URL
  VAULT_ADDR: "https://canteen-clutter-headscarf.ngrok-free.dev"
  TF_STATE_BASE_ADDRESS: "http://localhost:8200/v1/secret/data/state" # mock base url
  DEPLOYMENT_PATH: "deployments/my-free-cluster"

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Authenticate to Vault and fetch AWS Credentials using OIDC
      - name: Fetch AWS Credentials from Vault
        uses: hashicorp/vault-action@v2.7.0
        with:
          url: ${{ env.VAULT_ADDR }}
          role: github-actions
          path: jwt-github
          method: jwt
          jwtGithubAudience: "https://github.com/SirLance007"
          secrets: |
            aws/creds/admin-role access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/admin-role secret_key | AWS_SECRET_ACCESS_KEY

      # 3. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      # 4. Setup Terragrunt
      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.58.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt

      # 5. Run Terragrunt Action (Plan, Apply or Destroy)
      - name: Run Terragrunt
        run: |
          # If triggered by push, default to plan
          ACTION="plan"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ github.event.inputs.action }}"
          fi

          cd ${{ env.DEPLOYMENT_PATH }}

          if [ "$ACTION" = "plan" ]; then
            echo "Running Terragrunt Plan..."
            terragrunt plan
          elif [ "$ACTION" = "apply" ]; then
            echo "Running Terragrunt Apply..."
            terragrunt apply -auto-approve
          elif [ "$ACTION" = "destroy" ]; then
            echo "Running Terragrunt Destroy..."
            terragrunt destroy -auto-approve
          fi
